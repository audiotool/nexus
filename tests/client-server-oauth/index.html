<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audiotool OAuth Client/Server Example</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        margin: 5px;
      }
      #status {
        margin: 20px 0;
        padding: 15px;
        border-radius: 8px;
        background: #f5f5f5;
      }
      #log {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 15px;
        border-radius: 8px;
        font-family: monospace;
        white-space: pre-wrap;
        max-height: 400px;
        overflow-y: auto;
      }
      .success { color: #4caf50; }
      .error { color: #f44336; }
    </style>
  </head>
  <body>
    <h1>Audiotool OAuth Example</h1>
    <p>This example demonstrates browser OAuth authentication with server-side API calls.</p>
    
    <div id="status">Loading...</div>
    
    <div id="actions"></div>
    
    <h3>Log</h3>
    <div id="log"></div>

    <script type="module" src="/client.ts"></script>
  </body>
</html>
